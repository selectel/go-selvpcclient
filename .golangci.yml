version: "2"

formatters:
  enable:
    - gci
    - gofumpt
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/selectel/go-selvpcclient)

linters:
  enable:
    - asciicheck
    - depguard
    - dogsled
    - errcheck
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - godox
    - goheader
    - gomodguard
    - goprintffuncname
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unused
    - whitespace

  settings:
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/selectel/go-selvpcclient
            - github.com/gophercloud/gophercloud
            - github.com/google/go-querystring

  exclusions:
    presets:
      - comments
      - common-false-positives
      - std-error-handling
